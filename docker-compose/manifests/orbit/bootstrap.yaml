apiVersion: v1
kind: Namespace
metadata:
  name: alpha-zone
---
apiVersion: v1
kind: Namespace
metadata:
  name: bravo-zone
---
apiVersion: v1
kind: Namespace
metadata:
  name: charlie-zone
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: orbit-runner
  namespace: alpha-zone
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: bravo-runner
  namespace: bravo-zone
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: charlie-runner
  namespace: charlie-zone
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: orbit-grid
  namespace: alpha-zone
data:
  FEATURE_FLAG: "true"
  LOG_STYLE: "orbit"
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: bravo-grid
  namespace: bravo-zone
data:
  FEATURE_FLAG: "false"
  LOG_STYLE: "bravo"
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: charlie-routing
  namespace: charlie-zone
data:
  FEATURE_FLAG: "true"
  LOG_STYLE: "charlie"
---
apiVersion: v1
kind: Secret
metadata:
  name: orbit-seal
  namespace: alpha-zone
type: Opaque
stringData:
  token: orbit-secret-token
---
apiVersion: v1
kind: Secret
metadata:
  name: bravo-seal
  namespace: bravo-zone
type: Opaque
stringData:
  token: bravo-secret-token
---
apiVersion: v1
kind: Secret
