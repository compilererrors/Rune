apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: alpha-reader
  namespace: alpha-zone
rules:
  - apiGroups: [""]
    resources: ["pods", "services", "configmaps", "secrets"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: alpha-reader-binding
  namespace: alpha-zone
subjects:
  - kind: ServiceAccount
    name: orbit-runner
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: alpha-reader
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: bravo-reader
  namespace: bravo-zone
rules:
  - apiGroups: [""]
    resources: ["pods", "services", "configmaps", "secrets"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: bravo-reader-binding
  namespace: bravo-zone
subjects:
  - kind: ServiceAccount
    name: bravo-runner
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: bravo-reader
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: charlie-reader
  namespace: charlie-zone
rules:
  - apiGroups: [""]
    resources: ["pods", "services", "configmaps", "secrets"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: charlie-reader-binding
  namespace: charlie-zone
subjects:
  - kind: ServiceAccount
    name: charlie-runner
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: charlie-reader
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: orbit-lens
  namespace: alpha-zone
spec:
  replicas: 6
  selector:
    matchLabels:
      app: orbit-lens
  template:
    metadata:
      labels:
        app: orbit-lens
        tier: frontend
    spec:
      serviceAccountName: orbit-runner
      containers:
        - name: orbit-lens
          image: busybox:1.36
          command: ["/bin/sh", "-ec"]
          args:
            - |
              while true; do
                echo "orbit-lens heartbeat $(date -u +%H:%M:%S)"
                sleep 20
              done
---
apiVersion: v1
kind: Service
metadata:
  name: orbit-lens
  namespace: alpha-zone
spec:
  selector:
    app: orbit-lens
  ports:
    - port: 8080
      targetPort: 8080
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ember-gate
  namespace: alpha-zone
spec:
  replicas: 4
  selector:
    matchLabels:
      app: ember-gate
  template:
    metadata:
      labels:
        app: ember-gate
        tier: worker
    spec:
      containers:
        - name: ember-gate
          image: busybox:1.36
          command: ["/bin/sh", "-ec"]
          args:
            - |
              while true; do
                echo "ember-gate pulse $(date -u +%H:%M:%S)"
                sleep 25
              done
---
apiVersion: v1
kind: Service
metadata:
  name: orbit-vault
  namespace: alpha-zone
spec:
  clusterIP: None
  selector:
    app: orbit-vault
  ports:
    - port: 9000
      targetPort: 9000
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: orbit-vault
  namespace: alpha-zone
spec:
  serviceName: orbit-vault
  replicas: 2
  selector:
    matchLabels:
      app: orbit-vault
  template:
    metadata:
      labels:
        app: orbit-vault
    spec:
      containers:
        - name: orbit-vault
          image: busybox:1.36
          command: ["/bin/sh", "-ec"]
          args:
            - |
              while true; do
                echo "orbit-vault checkpoint $(hostname)"
                sleep 30
              done
          volumeMounts:
            - name: data
              mountPath: /data
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 256Mi
---
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: alpha-node-shadow
  namespace: alpha-zone
spec:
  selector:
    matchLabels:
      app: alpha-node-shadow
  template:
    metadata:
      labels:
        app: alpha-node-shadow
    spec:
      containers:
        - name: alpha-node-shadow
          image: busybox:1.36
          command: ["/bin/sh", "-ec"]
          args:
            - |
              while true; do
                echo "alpha-node-shadow on $(hostname)"
                sleep 45
              done
---
apiVersion: batch/v1
kind: Job
metadata:
  name: orbit-smoke-once
  namespace: alpha-zone
spec:
  completions: 3
  parallelism: 3
  template:
    spec:
      restartPolicy: Never
      containers:
        - name: orbit-smoke-once
          image: busybox:1.36
          command: ["/bin/sh", "-ec"]
          args:
            - echo "orbit smoke pass" && sleep 5
---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: orbit-sweep-cycle
  namespace: alpha-zone
spec:
  schedule: "*/15 * * * *"
  jobTemplate:
    spec:
      template:
        spec:
          restartPolicy: Never
          containers:
            - name: orbit-sweep-cycle
              image: busybox:1.36
              command: ["/bin/sh", "-ec"]
              args:
                - echo "orbit sweep cycle"
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: orbit-lens
  namespace: alpha-zone
spec:
  rules:
    - host: orbit-lens.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: orbit-lens
                port:
                  number: 8080
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: orbit-lens
  namespace: alpha-zone
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: orbit-lens
  minReplicas: 2
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
---
apiVersion: apps/v1
